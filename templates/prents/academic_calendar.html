{% extends 'base.html' %}
{% load static %}

{% block css %}
<link rel="stylesheet" href="{% static 'css/parent_modules.css' %}">
{% endblock %}

{% block content %}
<!-- START: ACADEMIC_CALENDAR -->
<div class="parent-module-container">
    <h2 class="module-header-title"><i class="fas fa-calendar-star"></i> Academic Calendar</h2>
    <div class="module-content">
        <p>School's official academic calendar including holidays and events.</p>
        <table class="data-table">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Event/Holiday</th>
                    <th>Details</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td colspan="3" style="text-align: center;">Calendar not yet published for this term.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
<!-- END: ACADEMIC_CALENDAR -->
{% endblock %}
