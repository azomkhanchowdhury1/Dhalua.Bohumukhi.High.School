{% extends 'base.html' %}
{% load static %}

{% block css %}
<link rel="stylesheet" href="{% static 'css/dashboard_base.css' %}">
<link rel="stylesheet" href="{% static 'css/dashboard_teachers.css' %}">
<link rel="stylesheet" href="{% static 'css/leave_requst.css' %}">
{% endblock %}

{% block content %}
<!-- START: LEAVE_REQUEST_CONTENT -->
<div class="dashboard-wrapper">
    <div class="leave-container">
        <div class="leave-form-card">
            <h2><i class="fas fa-envelope-open-text"></i> Apply for Leave</h2>
            <hr>

            <form action="" method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label>Leave Type</label>
                    <select name="type" class="form-control" required>
                        <option value="Sick">Sick Leave</option>
                        <option value="Casual">Casual Leave</option>
                        <option value="Emergency">Emergency Leave</option>
                    </select>
                </div>

                <div class="date-row">
                    <div class="form-group">
                        <label>From Date</label>
                        <input type="date" name="from_date" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>To Date</label>
                        <input type="date" name="to_date" class="form-control" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Reason</label>
                    <textarea name="reason" class="form-control" rows="4" required></textarea>
                </div>

                <button type="submit" class="btn-submit"><i class="fas fa-paper-plane"></i> Submit Request</button>
            </form>
        </div>

        <div class="leave-history">
            <h3>Recent Leave History</h3>
            <table class="leave-table">
                <thead>
                    <tr>
                        <th>Type</th>
                        <th>Date</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Casual Leave</td>
                        <td>May 10 - May 11, 2026</td>
                        <td class="leave-status-approved">Approved</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<!-- END: LEAVE_REQUEST_CONTENT -->
{% endblock %}
