{% extends 'base.html' %}
{% load static %}

{% block css %}
<style>
    /* START: SALARY_SLIPS */
    .salary-container {
        padding: 20px;
        background: #fff;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        margin-top: 20px;
    }
    .salary-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 15px;
    }
    .salary-table th, .salary-table td {
        padding: 12px 15px;
        text-align: left;
        border-bottom: 1px solid #e5e7eb;
    }
    .salary-table th {
        background-color: #f9fafb;
        font-weight: 600;
        color: #4b5563;
    }
    .status-paid {
        background-color: #d1fae5;
        color: #065f46;
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 12px;
        font-weight: bold;
    }
    .btn-download {
        background: #0ea5e9;
        color: white;
        padding: 5px 10px;
        border-radius: 4px;
        text-decoration: none;
        font-size: 13px;
    }
    /* END: SALARY_SLIPS */
</style>
{% endblock %}

{% block content %}
<!-- START: SALARY_SLIPS_CONTENT -->
<div class="salary-container">
    <h2><i class="fas fa-money-check-alt" style="color: #0ea5e9;"></i> My Salary Slips</h2>
    <hr style="opacity: 0.2; margin: 15px 0;">
    
    <table class="salary-table">
        <thead>
            <tr>
                <th>Month & Year</th>
                <th>Basic Pay</th>
                <th>Deductions</th>
                <th>Net Salary</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>May 2026</td>
                <td>$3,000</td>
                <td>$150</td>
                <td>$2,850</td>
                <td><span class="status-paid">Paid</span></td>
                <td><a href="#" class="btn-download"><i class="fas fa-download"></i> Slip</a></td>
            </tr>
            <tr>
                <td>April 2026</td>
                <td>$3,000</td>
                <td>$0</td>
                <td>$3,000</td>
                <td><span class="status-paid">Paid</span></td>
                <td><a href="#" class="btn-download"><i class="fas fa-download"></i> Slip</a></td>
            </tr>
        </tbody>
    </table>
</div>
<!-- END: SALARY_SLIPS_CONTENT -->
{% endblock %}
