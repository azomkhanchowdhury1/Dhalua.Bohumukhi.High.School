{% load static %}

{% block css %}

{% block content %}
<!-- START: STUDY_MATERIAL_CONTENT -->

        <div class="material-card">
            <div class="material-icon"><i class="fas fa-file-powerpoint"></i></div>
            <div class="material-title">Biology Cells Presentation</div>

            <a href="#" class="btn-download"><i class="fas fa-download"></i> Download</a>

    </div>
    </div>
</div>

{% endblock %}
