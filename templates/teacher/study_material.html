{% extends 'base.html' %}
{% load static %}

{% block css %}
<style>
    /* START: STUDY_MATERIAL */
    .material-container {
        padding: 20px;
        background: #fff;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        margin-top: 20px;
    }
    .material-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 20px;
        margin-top: 20px;
    }
    .material-card {
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        padding: 15px;
        transition: transform 0.2s;
    }
    .material-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
    }
    .material-icon {
        font-size: 40px;
        color: #8b5cf6;
        margin-bottom: 15px;
    }
    .material-title {
        font-weight: 600;
        font-size: 16px;
        margin-bottom: 5px;
    }
    .material-meta {
        font-size: 12px;
        color: #6b7280;
        margin-bottom: 15px;
    }
    .btn-download {
        display: inline-block;
        background: #f3f4f6;
        color: #374151;
        padding: 5px 10px;
        border-radius: 4px;
        text-decoration: none;
        font-size: 13px;
        border: 1px solid #d1d5db;
    }
    /* END: STUDY_MATERIAL */
</style>
{% endblock %}

{% block content %}
<!-- START: STUDY_MATERIAL_CONTENT -->
<div class="material-container">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h2><i class="fas fa-folder-open" style="color: #8b5cf6;"></i> Study Material Repository</h2>
        <button class="btn btn-primary" style="background: #8b5cf6; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer;">
            <i class="fas fa-upload"></i> Upload Material
        </button>
    </div>
    <hr style="opacity: 0.2; margin: 15px 0;">
    
    <div class="material-grid">
        <div class="material-card">
            <div class="material-icon"><i class="fas fa-file-pdf"></i></div>
            <div class="material-title">Physics Chapter 1 Notes</div>
            <div class="material-meta">Class 10 • Uploaded: June 01, 2026</div>
            <a href="#" class="btn-download"><i class="fas fa-download"></i> Download</a>
        </div>
        <div class="material-card">
            <div class="material-icon"><i class="fas fa-file-powerpoint" style="color: #ef4444;"></i></div>
            <div class="material-title">Biology Cells Presentation</div>
            <div class="material-meta">Class 9 • Uploaded: May 28, 2026</div>
            <a href="#" class="btn-download"><i class="fas fa-download"></i> Download</a>
        </div>
    </div>
</div>
<!-- END: STUDY_MATERIAL_CONTENT -->
{% endblock %}
