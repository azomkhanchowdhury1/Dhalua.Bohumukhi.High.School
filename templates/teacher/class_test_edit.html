{% extends 'base.html' %}
{% load static %}

{% block css %}
<link rel="stylesheet" href="{% static 'css/dashboard_base.css' %}">
<link rel="stylesheet" href="{% static 'css/dashboard_teachers.css' %}">

{% endblock %}

{% block content %}
<div class="dashboard-wrapper">
    <div class="edit-container">
        <div class="edit-card">
            <h3><i class="fas fa-edit"></i> Edit Class Test</h3>
            
            <form method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label>Test Title *</label>
                    <input type="text" name="title" class="form-control" value="{{ exam.name }}" required>
                </div>
                
                <div class="form-group">
                    <label>Class *</label>
                    <select name="class_id" class="form-control" required>
                        <option value="">— Choose Class —</option>
                        {% for cls in classes %}
                        <option value="{{ cls.id }}" {% if schedule.school_class.id == cls.id %}selected{% endif %}>{{ cls.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label>Section *</label>
                    <select name="section_id" class="form-control" required>
                        <option value="">— Choose Section —</option>
                        {% for sec in sections %}
                        <option value="{{ sec.id }}" {% if schedule.section.id == sec.id %}selected{% endif %}>{{ sec.name }} ({{ sec.school_class.name }})</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label>Subject *</label>
                    <select name="subject_id" class="form-control" required>
                        <option value="">— Choose Subject —</option>
                        {% for sub in subjects %}
                        <option value="{{ sub.id }}" {% if schedule.subject.id == sub.id %}selected{% endif %}>{{ sub.name }} ({{ sub.school_class.name }})</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label>Exam Date *</label>
                    <input type="date" name="date" class="form-control" value="{{ schedule.date|date:'Y-m-d' }}" required>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label>Start Time *</label>
                        <input type="time" name="start_time" class="form-control" value="{{ schedule.start_time|time:'H:i' }}" required>
                    </div>
                    <div class="form-group">
                        <label>End Time *</label>
                        <input type="time" name="end_time" class="form-control" value="{{ schedule.end_time|time:'H:i' }}" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Total Marks *</label>
                    <input type="number" name="total_marks" class="form-control" value="{{ schedule.total_marks }}" min="1" required>
                </div>

                <div class="form-group">
                    <label>Instructions</label>
                    <textarea name="instructions" class="form-control" rows="3">{{ schedule.instructions|default:'' }}</textarea>
                </div>

                <div class="form-group" style="display: flex; align-items: center; gap: 8px;">
                    <input type="checkbox" name="publish" id="publish" value="true" {% if exam.is_published %}checked{% endif %} style="width: 18px; height: 18px; cursor: pointer;">
                    <label for="publish" style="margin: 0; cursor: pointer; font-weight: 500;">Publish immediately?</label>
                </div>

                <div class="form-actions">
                    <a href="{% url 'teacher:class_test_list' %}" class="btn-edit btn-cancel">Cancel</a>
                    <button type="submit" class="btn-edit btn-save">
                        <i class="fas fa-save"></i> Save Changes
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
