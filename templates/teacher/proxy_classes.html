{% extends 'base.html' %}
{% load static %}

{% block css %}
<link rel="stylesheet" href="{% static 'css/dashboard_base.css' %}">

<link rel="stylesheet" href="{% static 'css/proxy_class.css' %}">
{% endblock %}

{% block content %}
<!-- START: PROXY_CLASSES_CONTENT -->

        <div class="proxy-header">
            <h2><i class="fas fa-exchange-alt"></i> Proxy Classes Assigned</h2>
        </div>

        <table class="proxy-table">

                <tr>
                    <th>Date</th>
                    <th>Time</th>
                    <th>Class</th>
                    <th>Original Teacher</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>June 05, 2026</td>
                    <td>11:15 AM - 12:00 PM</td>
                    <td>Class 7 (Section C)</td>
                    <td>Mr. Smith (English)</td>
                    <td><span class="status-badge">Assigned</span></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
<!-- END: PROXY_CLASSES_CONTENT -->
{% endblock %}
