{% extends 'base.html' %}
{% load static %}

{% block css %}
<link rel="stylesheet" href="{% static 'css/dashboard_base.css' %}">
<link rel="stylesheet" href="{% static 'css/dashboard_students.css' %}">
<link rel="stylesheet" href="{% static 'css/profile_settings.css' %}">
{% endblock %}

{% block content %}
<!-- START: STUDENT_EDIT_PROFILE_SECTION -->
<div class="dashboard-wrapper">
    <div class="settings-container">
        <div class="settings-header">
            <h1 class="profile-name">Edit Profile</h1>
            <p>Update your personal information and contact details.</p>
        </div>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <div>
                <div class="settings-form-group">
                    <label>First Name</label>
                    <input type="text" name="first_name" value="{{ student.user.first_name }}" required>
                </div>
                <div class="settings-form-group">
                    <label>Last Name</label>
                    <input type="text" name="last_name" value="{{ student.user.last_name }}" required>
                </div>
            </div>

            <div class="settings-form-group">
                <label>Phone Number</label>
                <input type="text" name="phone" value="{{ student.phone_number|default:'' }}">
            </div>

            <div class="settings-form-group">
                <label>Permanent Address</label>
                <textarea name="address" rows="3">{{ student.address|default:'' }}</textarea>
            </div>

            <div class="settings-form-group">
                <label>Blood Group</label>
                <select name="blood_group">
                    <option value="" {% if not student.blood_group %}selected{% endif %}>Select Blood Group</option>
                    <option value="A+" {% if student.blood_group == 'A+' %}selected{% endif %}>A+</option>
                    <option value="A-" {% if student.blood_group == 'A-' %}selected{% endif %}>A-</option>
                    <option value="B+" {% if student.blood_group == 'B+' %}selected{% endif %}>B+</option>
                    <option value="B-" {% if student.blood_group == 'B-' %}selected{% endif %}>B-</option>
                    <option value="O+" {% if student.blood_group == 'O+' %}selected{% endif %}>O+</option>
                    <option value="O-" {% if student.blood_group == 'O-' %}selected{% endif %}>O-</option>
                    <option value="AB+" {% if student.blood_group == 'AB+' %}selected{% endif %}>AB+</option>
                    <option value="AB-" {% if student.blood_group == 'AB-' %}selected{% endif %}>AB-</option>
                </select>
            </div>

            <div class="settings-form-group">
                <label>Profile Picture</label>
                <input type="file" name="profile_image">
            </div>

            <div class="actions-row">
                <button type="submit" class="btn-primary">Update Profile</button>
                <a href="{% url 'student:profile' %}" class="btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
<!-- END: STUDENT_EDIT_PROFILE_SECTION -->
{% endblock %}
