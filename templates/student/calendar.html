{% extends 'base.html' %}
{% load static %}

{% block css %}
<link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
<style>
    /* START: SCHOOL_CALENDAR_CSS */
    .cal-wrapper {
        background: rgba(15, 23, 42, 0.6);
        padding: 1.5rem;
        border-radius: 22px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        max-width: 700px;
        margin: 0 auto;
    }
    .cal-nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
    }
    .cal-nav h2 { color: #fff; font-size: 1.1rem; font-weight: 600; }
    .cal-nav button {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.1);
        color: #fff;
        width: 34px; height: 34px;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.2s;
    }
    .cal-nav button:hover { background: rgba(99,102,241,0.3); }
    .cal-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 4px;
    }
    .cal-head {
        text-align: center;
        color: #64748b;
        font-weight: 700;
        font-size: 0.72rem;
        padding: 6px 2px;
        text-transform: uppercase;
    }
    .cal-cell {
        text-align: center;
        height: 36px;
        line-height: 36px;
        border-radius: 8px;
        font-size: 0.85rem;
        color: #94a3b8;
        cursor: default;
        position: relative;
        transition: background 0.2s;
    }
    .cal-cell.active { color: #e2e8f0; background: rgba(255,255,255,0.04); }
    .cal-cell.active:hover { background: rgba(99,102,241,0.15); color: #fff; }
    .cal-cell.today {
        background: rgba(99, 102, 241, 0.2);
        color: #a5b4fc;
        font-weight: 700;
        border: 1px solid rgba(99,102,241,0.4);
    }
    .cal-cell.inactive { color: #334155; }
    .event-dot {
        width: 5px; height: 5px;
        border-radius: 50%;
        position: absolute;
        bottom: 4px;
        left: 50%;
        transform: translateX(-50%);
    }
    .cal-legend {
        display: flex;
        gap: 20px;
        margin-top: 14px;
        flex-wrap: wrap;
    }
    .cal-legend span {
        display: flex;
        align-items: center;
        gap: 6px;
        color: #94a3b8;
        font-size: 0.78rem;
    }
    /* END: SCHOOL_CALENDAR_CSS */
</style>
{% endblock %}

{% block content %}
<!-- START: STUDENT_CALENDAR_SECTION -->
<div class="dashboard-wrapper">
    <div class="section-header">
        <h1>School Calendar</h1>
        <p>Upcoming holidays, events, and important academic dates.</p>
    </div>

    <div class="cal-wrapper">
        <div class="cal-nav">
            <button id="prevMonth"><i class="fas fa-chevron-left"></i></button>
            <h2 id="calTitle"></h2>
            <button id="nextMonth"><i class="fas fa-chevron-right"></i></button>
        </div>
        <div class="cal-grid" id="calGrid"></div>
        <div class="cal-legend">
            <span><span style="width:10px;height:10px;border-radius:50%;background:#ef4444;display:inline-block;"></span> Public Holiday</span>
            <span><span style="width:10px;height:10px;border-radius:50%;background:#f59e0b;display:inline-block;"></span> School Event</span>
            <span><span style="width:10px;height:10px;border-radius:50%;background:#6366f1;display:inline-block;"></span> Today</span>
        </div>
    </div>
</div>
<!-- END: STUDENT_CALENDAR_SECTION -->
{% endblock %}

{% block js %}
<script>
// START: CALENDAR_SCRIPT
(function () {
    const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const MONTHS = ['January','February','March','April','May','June',
                    'July','August','September','October','November','December'];

    const today = new Date();
    let cur = { year: today.getFullYear(), month: today.getMonth() };

    function renderCalendar({ year, month }) {
        const grid = document.getElementById('calGrid');
        const title = document.getElementById('calTitle');
        title.textContent = `${MONTHS[month]} ${year}`;

        // Build day headers
        let html = DAYS.map(d => `<div class="cal-head">${d}</div>`).join('');

        const firstDay = new Date(year, month, 1).getDay(); // 0=Sun
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const prevDays = new Date(year, month, 0).getDate();

        // Previous month filler cells
        for (let i = firstDay - 1; i >= 0; i--) {
            html += `<div class="cal-cell inactive">${prevDays - i}</div>`;
        }

        // Current month cells
        for (let d = 1; d <= daysInMonth; d++) {
            const isToday = (d === today.getDate() && month === today.getMonth() && year === today.getFullYear());
            const cls = isToday ? 'cal-cell today' : 'cal-cell active';
            html += `<div class="${cls}">${d}${isToday ? '' : ''}</div>`;
        }

        // Next month filler
        const totalCells = firstDay + daysInMonth;
        const remaining = (7 - (totalCells % 7)) % 7;
        for (let d = 1; d <= remaining; d++) {
            html += `<div class="cal-cell inactive">${d}</div>`;
        }

        grid.innerHTML = html;
    }

    document.getElementById('prevMonth').addEventListener('click', () => {
        cur.month--;
        if (cur.month < 0) { cur.month = 11; cur.year--; }
        renderCalendar(cur);
    });
    document.getElementById('nextMonth').addEventListener('click', () => {
        cur.month++;
        if (cur.month > 11) { cur.month = 0; cur.year++; }
        renderCalendar(cur);
    });

    renderCalendar(cur);
})();
// END: CALENDAR_SCRIPT
</script>
{% endblock %}
