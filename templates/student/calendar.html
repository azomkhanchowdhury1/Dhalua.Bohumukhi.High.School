{% extends 'base.html' %}
{% load static %}

{% block css %}
<link rel="stylesheet" href="{% static 'css/dashboard_base.css' %}">
<link rel="stylesheet" href="{% static 'css/dashboard_students.css' %}">
<link rel="stylesheet" href="{% static 'css/school_calender.css' %}">
{% endblock %}

{% block content %}
<!-- START: STUDENT_CALENDAR_SECTION -->
<div class="dashboard-wrapper calendar-page">
    <div class="calendar-page-heading">
        <h1><i class="fas fa-calendar-day"></i> School Calendar</h1>
        <p>Upcoming holidays, events, and important academic dates.</p>
    </div>

    <div class="cal-wrapper">
        <div class="cal-nav">
            <button id="prevMonth"><i class="fas fa-chevron-left"></i></button>
            <h2 id="calTitle"></h2>
            <button id="nextMonth"><i class="fas fa-chevron-right"></i></button>
        </div>
        <div class="cal-grid" id="calGrid"></div>
        <div class="cal-legend">
            <span><span class="cal-legend-dot"></span> Public Holiday</span>
            <span><span class="cal-legend-dot"></span> School Event</span>
            <span><span class="cal-legend-dot"></span> Today</span>
        </div>
    </div>
</div>
<!-- END: STUDENT_CALENDAR_SECTION -->
{% endblock %}

{% block js %}
<script>
// START: CALENDAR_SCRIPT
(function () {
    const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const MONTHS = ['January','February','March','April','May','June',
                    'July','August','September','October','November','December'];

    const today = new Date();
    let cur = { year: today.getFullYear(), month: today.getMonth() };

    function renderCalendar({ year, month }) {
        const grid = document.getElementById('calGrid');
        const title = document.getElementById('calTitle');
        title.textContent = `${MONTHS[month]} ${year}`;

        let html = DAYS.map(d => `<div class="cal-head">${d}</div>`).join('');

        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const prevDays = new Date(year, month, 0).getDate();

        for (let i = firstDay - 1; i >= 0; i--) {
            html += `<div class="cal-cell inactive">${prevDays - i}</div>`;
        }

        for (let d = 1; d <= daysInMonth; d++) {
            const isToday = (d === today.getDate() && month === today.getMonth() && year === today.getFullYear());
            const cls = isToday ? 'cal-cell today' : 'cal-cell active';
            html += `<div class="${cls}">${d}${isToday ? '' : ''}</div>`;
        }

        const totalCells = firstDay + daysInMonth;
        const remaining = (7 - (totalCells % 7)) % 7;
        for (let d = 1; d <= remaining; d++) {
            html += `<div class="cal-cell inactive">${d}</div>`;
        }

        grid.innerHTML = html;
    }

    document.getElementById('prevMonth').addEventListener('click', () => {
        cur.month--;
        if (cur.month < 0) { cur.month = 11; cur.year--; }
        renderCalendar(cur);
    });
    document.getElementById('nextMonth').addEventListener('click', () => {
        cur.month++;
        if (cur.month > 11) { cur.month = 0; cur.year++; }
        renderCalendar(cur);
    });

    renderCalendar(cur);
})();
// END: CALENDAR_SCRIPT
</script>
{% endblock %}
