{% extends 'base.html' %}
{% load static %}

{% block content %}
<!-- START: EDIT_SECTION_SECTION -->
<div class="dashboard-wrapper">
    <div class="edit-card">
        <h2>Edit Section</h2>
        <p>Update the section name, room number and assigned class below.</p>

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label>Select Class</label>
                <select name="class_id" required>
                    {% for cls in classes %}
                    <option value="{{ cls.id }}" {% if cls.id==section.school_class.id %}selected{% endif %}>{{ cls.name
                        }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label>Section Name</label>
                <input type="text" name="name" value="{{ section.name }}" required>
            </div>

            <div class="form-group">
                <label>Room Number</label>
                <input type="text" name="room" value="{{ section.room_number|default:'' }}">
            </div>

            <div class="btn-group">
                <button type="submit" class="btn-save">Save Changes</button>
                <a href="{% url 'admin_panel:academics_classes' %}" class="btn-cancel">Cancel</a>
            </div>
        </form>
    </div>
</div>
<!-- END: EDIT_SECTION_SECTION -->
{% endblock %}
