{% extends 'base.html' %}
{% load static %}

{% block content %}
<!-- START: SUBJECT_EDIT_SECTION -->
<div class="dashboard-wrapper">
    <div class="section-header">
        <h1>Edit Subject</h1>
        <p>Update the details for <strong>{{ subject.name }}</strong>.</p>
    </div>

    <div>
        <div>

            {% if messages %}
            <div>
                {% for message in messages %}
                <div>
                    <i class="fas {% if message.tags == 'error' %}fa-exclamation-circle{% else %}fa-check-circle{% endif %}"></i>
                    {{ message }}
                </div>
                {% endfor %}
            </div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}

                <div>

                    <!-- Class -->
                    <div>
                        <label>
                            <i class="fas fa-chalkboard"></i> Class
                        </label>
                        <select name="class_id" required>
                            {% for cls in classes %}
                            <option value="{{ cls.id }}" {% if cls.id == subject.school_class.id %}selected{% endif %}>
                                {{ cls.name }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>

                    <!-- Subject Name -->
                    <div>
                        <label>
                            <i class="fas fa-book"></i> Subject Name
                        </label>
                        <input type="text" name="name" value="{{ subject.name }}" required>
                    </div>

                    <!-- Subject Code -->
                    <div>
                        <label>
                            <i class="fas fa-tag"></i> Subject Code
                        </label>
                        <input type="text" name="code" value="{{ subject.code }}" required>
                    </div>

                    <!-- Reminder Toggle -->
                    <div>
                        <div>
                            <label>
                                <i class="fas fa-bookmark"></i> Mark as Reminder
                            </label>

                            <label>
                                <input type="checkbox" name="is_remembered" id="reminderToggle"
                                    {% if subject.is_remembered %}checked{% endif %}>
                                <span id="toggleTrack"></span>
                                <span id="toggleThumb"></span>
                            </label>
                        </div>

                        <div id="reminder-note-wrap">
                            <label>Reminder Note (optional)</label>
                            <textarea name="reminder_note" rows="3" placeholder="Add a note about this subject...">{{ subject.reminder_note }}</textarea>
                        </div>
                    </div>

                    <!-- Buttons -->
                    <div>
                        <button type="submit" class="view-all-btn">
                            <i class="fas fa-save"></i> Save Changes
                        </button>

                        <a href="{% url 'admin_panel:academics_subjects' %}">
                            <i class="fas fa-arrow-left"></i> Cancel
                        </a>
                    </div>

                </div>
            </form>

        </div>
    </div>
</div>
<!-- END: SUBJECT_EDIT_SECTION -->
{% endblock %}
