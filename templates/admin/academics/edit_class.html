{% extends 'base.html' %}
{% load static %}

{% block content %}
<!-- START: EDIT_CLASS_SECTION -->
<div class="dashboard-wrapper">
    <div class="edit-card">
        <h2>Edit Class</h2>
        <p>Update the class name and class code below.</p>

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label>Class Name</label>
                <input type="text" name="name" value="{{ school_class.name }}" required>
            </div>

            <div class="form-group">
                <label>Class Code</label>
                <input type="text" name="code" value="{{ school_class.code }}" required>
            </div>

            <div class="btn-group">
                <button type="submit" class="btn-save">Save Changes</button>
                <a href="{% url 'admin_panel:academics_classes' %}" class="btn-cancel">Cancel</a>
            </div>
        </form>
    </div>
</div>
<!-- END: EDIT_CLASS_SECTION -->
{% endblock %}
