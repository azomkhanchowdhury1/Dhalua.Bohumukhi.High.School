{% extends 'base.html' %}
{% load static %}

{% block content %}
<!-- START: ACADEMICS_TIMETABLE_EDIT_SECTION -->
<div class="dashboard-wrapper">
    <div class="edit-container">
        <h2 class="edit-title">Edit Timetable Slot</h2>
        <form method="POST">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="section_id">Section</label>
                <select name="section_id" id="section_id" required class="form-control">
                    {% for sec in sections %}
                    <option value="{{ sec.id }}" {% if sec.id == slot.section.id %}selected{% endif %}>{{ sec }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="subject_id">Subject</label>
                <select name="subject_id" id="subject_id" required class="form-control">
                    {% for sub in subjects %}
                    <option value="{{ sub.id }}" {% if sub.id == slot.subject.id %}selected{% endif %}>{{ sub.name }} ({{ sub.school_class.name }})</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="day">Day</label>
                <select name="day" id="day" required class="form-control">
                    {% for day in days %}
                    <option value="{{ day }}" {% if day == slot.day %}selected{% endif %}>{{ day }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="start_time">Start Time</label>
                <input type="time" name="start_time" id="start_time" required class="form-control" value="{{ slot.start_time|time:'H:i' }}">
            </div>

            <div class="form-group">
                <label for="end_time">End Time</label>
                <input type="time" name="end_time" id="end_time" required class="form-control" value="{{ slot.end_time|time:'H:i' }}">
            </div>

            <div class="checkbox-group">
                <input type="checkbox" name="is_remembered" id="is_remembered" {% if slot.is_remembered %}checked{% endif %}>
                <label for="is_remembered">Set Active Reminder (Bookmark)</label>
            </div>

            <div class="form-group" id="reminder_note_container">
                <label for="reminder_note">Reminder Note / Notice for this Class</label>
                <textarea name="reminder_note" id="reminder_note" rows="3" class="form-control" placeholder="e.g. Bring physics workbook, Class test today...">{{ slot.reminder_note|default:'' }}</textarea>
            </div>

            <div class="btn-container">
                <a href="{% url 'admin_panel:academics_timetable' %}" class="btn-cancel">Cancel</a>
                <button type="submit" class="btn-submit">Save Changes</button>
            </div>
        </form>
    </div>
</div>
<!-- END: ACADEMICS_TIMETABLE_EDIT_SECTION -->
{% endblock %}
