{% extends 'base.html' %}
{% load static %}

{% block content %}
<!-- START: ACADEMICS_SYLLABUS_EDIT_SECTION -->
<div class="dashboard-wrapper">
    <div class="edit-container">
        <h2 class="edit-title">Edit Syllabus</h2>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="form-group">
                <label for="subject_id">Subject</label>
                <select name="subject_id" id="subject_id" required class="form-control">
                    {% for sub in subjects %}
                    <option value="{{ sub.id }}" {% if sub.id == syllabus.subject.id %}selected{% endif %}>
                        {{ sub.name }} ({{ sub.school_class.name }})
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="title">Syllabus Title</label>
                <input type="text" name="title" id="title" required class="form-control" value="{{ syllabus.title }}">
            </div>

            <div class="form-group">
                <label for="file">Update Syllabus File (Leave blank to keep current)</label>
                <input type="file" name="file" id="file" class="form-control">

                {% if syllabus.file %}
                <div class="current-file">
                    <i class="fas fa-file-pdf"></i>
                    Current File:
                    <a href="{{ syllabus.file.url }}" target="_blank">{{ syllabus.file.name }}</a>
                </div>
                {% endif %}
            </div>

            <div class="checkbox-group">
                <input type="checkbox" name="is_remembered" id="is_remembered" {% if syllabus.is_remembered %}checked{% endif %}>
                <label for="is_remembered">Pin this Syllabus (Active Reminder)</label>
            </div>

            <div class="form-group">
                <label for="reminder_note">Reminder / Special Instructions Note</label>
                <textarea name="reminder_note" id="reminder_note" rows="3" class="form-control" placeholder="e.g. Read chapter 3 for standard assessment, Final term coverage guidelines...">{{ syllabus.reminder_note|default:'' }}</textarea>
            </div>

            <div class="btn-container">
                <a href="{% url 'admin_panel:academics_syllabus' %}" class="btn-cancel">Cancel</a>
                <button type="submit" class="btn-submit">Save Changes</button>
            </div>
        </form>
    </div>
</div>
<!-- END: ACADEMICS_SYLLABUS_EDIT_SECTION -->
{% endblock %}
