{% extends 'base.html' %}
{% load static %}

{% block css %}
<link rel="stylesheet" href="{% static 'css/dashboard_base.css' %}">
<link rel="stylesheet" href="{% static 'css/dashboard_finance.css' %}">
{% endblock %}

{% block content %}
<!-- START: FEE_TYPE_EDIT_SECTION -->

<div class="dashboard-wrapper">

    <div class="section-header">
        <h1>Edit Fee Type</h1>
        <p>Update fee type name, amount and reminder settings.</p>
    </div>


    <div>

        <div>

            <span>💳</span>

            <div>
                <p>Editing Fee Type</p>
                <p>{{ fee_type.name }}</p>
            </div>

        </div>



        <form method="POST">

            {% csrf_token %}


            <div>

                <label>Fee Type Name</label>

                <input type="text" name="name" id="fee_type_name" value="{{ fee_type.name }}" required>

            </div>



            <div>

                <label>Amount ($)</label>

                <input type="number" step="0.01" name="amount" id="fee_type_amount" value="{{ fee_type.amount }}" required>

            </div>



            <!-- Reminder Section -->

            <div>

                <label>

                    <input type="checkbox" name="is_remembered" id="fee_type_is_remembered" {% if fee_type.is_remembered %}checked{% endif %}>

                    <span>
                        📌 Mark as Important / Pinned
                    </span>

                </label>



                <div>

                    <label>
                        Reminder Note (optional)
                    </label>


                    <textarea name="reminder_note" id="fee_type_reminder_note" placeholder="e.g. Collect by end of month..." rows="3">{{ fee_type.reminder_note|default:"" }}</textarea>


                </div>


            </div>



            <div>


                <button type="submit" id="update_fee_type_btn" class="view-all-btn">
                    ✅ Update Fee Type
                </button>


                <a href="{% url 'admin_panel:finance_fees' %}" id="cancel_fee_type_edit">
                    Cancel
                </a>


            </div>


        </form>


    </div>


</div>


<!-- END: FEE_TYPE_EDIT_SECTION -->

{% endblock %}
