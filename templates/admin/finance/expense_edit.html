{% extends 'base.html' %}
{% load static %}

{% block css %}
<link rel="stylesheet" href="{% static 'css/dashboard_base.css' %}">
<link rel="stylesheet" href="{% static 'css/dashboard_finance.css' %}">
{% endblock %}

{% block content %}
<!-- START: EXPENSE_EDIT_SECTION -->

<div class="dashboard-wrapper">

    <div class="section-header">
        <h1>Edit Expense</h1>
        <p>Update expenditure record details and reminder settings.</p>
    </div>


    <div>

        <!-- Expense info badge -->
        <div>
            <span>💸</span>

            <div>
                <p>Editing Expense</p>
                <p>{{ expense.title }}</p>
            </div>
        </div>



        <form method="POST">
            {% csrf_token %}


            <div>
                <label>Title</label>
                <input type="text" name="title" id="expense_edit_title" value="{{ expense.title }}" required>
            </div>


            <div>
                <label>Category</label>

                <select name="category" id="expense_edit_category" required>

                    <option value="Utility" {% if expense.category=='Utility' %}selected{% endif %}>
                        Utility
                    </option>

                    <option value="Salary" {% if expense.category=='Salary' %}selected{% endif %}>
                        Salary
                    </option>

                    <option value="Maintenance" {% if expense.category=='Maintenance' %}selected{% endif %}>
                        Maintenance
                    </option>

                    <option value="Supplies" {% if expense.category=='Supplies' %}selected{% endif %}>
                        Supplies
                    </option>

                    <option value="Others" {% if expense.category=='Others' %}selected{% endif %}>
                        Others
                    </option>

                </select>

            </div>



            <div>
                <label>Amount ($)</label>

                <input type="number" step="0.01" name="amount" id="expense_edit_amount" value="{{ expense.amount }}"
                    required>

            </div>



            <div>
                <label>Date</label>

                <input type="date" name="date" id="expense_edit_date" value="{{ expense.date|date:'Y-m-d' }}" required>

            </div>



            <div>
                <label>Description (optional)</label>

                <textarea name="description" id="expense_edit_description" rows="3"
                    placeholder="Additional details...">{{ expense.description|default:"" }}</textarea>

            </div>



            <!-- Reminder Section -->

            <div>

                <label>

                    <input type="checkbox" name="is_remembered" id="expense_edit_is_remembered" {% if
                        expense.is_remembered %}checked{% endif %}>

                    <span>
                        📌 Mark as Important / Pinned
                    </span>

                </label>


                <div>

                    <label>
                        Reminder Note (optional)
                    </label>


                    <textarea name="reminder_note" id="expense_edit_reminder_note"
                        placeholder="e.g. Recurring monthly expense..."
                        rows="2">{{ expense.reminder_note|default:"" }}</textarea>

                </div>


            </div>



            <div>

                <button type="submit" id="update_expense_btn" class="view-all-btn">
                    ✅ Update Expense
                </button>


                <a href="{% url 'admin_panel:finance_expenses' %}" id="cancel_expense_edit">
                    Cancel
                </a>

            </div>


        </form>


    </div>


</div>

<!-- END: EXPENSE_EDIT_SECTION -->

{% endblock %}
