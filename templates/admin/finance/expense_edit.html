{% extends 'base.html' %}
{% load static %}

{% block css %}
<link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
{% endblock %}

{% block content %}
<!-- START: EXPENSE_EDIT_SECTION -->
<div class="dashboard-wrapper">
    <div class="section-header">
        <h1>Edit Expense</h1>
        <p>Update expenditure record details and reminder settings.</p>
    </div>

    <div style="max-width:620px; margin:0 auto; background:rgba(15,23,42,0.6); padding:2.5rem; border-radius:24px; border:1px solid rgba(255,255,255,0.1);">
        <!-- Expense info badge -->
        <div style="background:rgba(239,68,68,0.07); padding:1rem 1.5rem; border-radius:14px; border:1px solid rgba(239,68,68,0.2); margin-bottom:25px; display:flex; align-items:center; gap:14px;">
            <span style="font-size:2rem;">💸</span>
            <div>
                <p style="color:#94a3b8; font-size:0.82rem; margin:0;">Editing Expense</p>
                <p style="color:#fff; font-weight:700; font-size:1.05rem; margin:0;">{{ expense.title }}</p>
            </div>
        </div>

        <form method="POST">
            {% csrf_token %}
            <div style="margin-bottom:20px; display:flex; flex-direction:column; gap:8px;">
                <label style="color:#94a3b8; font-size:0.9rem;">Title</label>
                <input type="text" name="title" id="expense_edit_title" value="{{ expense.title }}" required
                    style="background:rgba(255,255,255,0.05); color:#fff; padding:12px 16px; border-radius:12px; border:1px solid rgba(255,255,255,0.15); font-size:1rem; width:100%; box-sizing:border-box;">
            </div>
            <div style="margin-bottom:20px; display:flex; flex-direction:column; gap:8px;">
                <label style="color:#94a3b8; font-size:0.9rem;">Category</label>
                <select name="category" id="expense_edit_category" required
                    style="background:rgba(30,41,59,1); color:#fff; padding:12px 16px; border-radius:12px; border:1px solid rgba(255,255,255,0.15); font-size:1rem; width:100%; box-sizing:border-box;">
                    <option value="Utility" {% if expense.category == 'Utility' %}selected{% endif %}>Utility</option>
                    <option value="Salary" {% if expense.category == 'Salary' %}selected{% endif %}>Salary</option>
                    <option value="Maintenance" {% if expense.category == 'Maintenance' %}selected{% endif %}>Maintenance</option>
                    <option value="Supplies" {% if expense.category == 'Supplies' %}selected{% endif %}>Supplies</option>
                    <option value="Others" {% if expense.category == 'Others' %}selected{% endif %}>Others</option>
                </select>
            </div>
            <div style="margin-bottom:20px; display:flex; flex-direction:column; gap:8px;">
                <label style="color:#94a3b8; font-size:0.9rem;">Amount ($)</label>
                <input type="number" step="0.01" name="amount" id="expense_edit_amount" value="{{ expense.amount }}" required
                    style="background:rgba(255,255,255,0.05); color:#fff; padding:12px 16px; border-radius:12px; border:1px solid rgba(255,255,255,0.15); font-size:1rem; width:100%; box-sizing:border-box;">
            </div>
            <div style="margin-bottom:20px; display:flex; flex-direction:column; gap:8px;">
                <label style="color:#94a3b8; font-size:0.9rem;">Date</label>
                <input type="date" name="date" id="expense_edit_date" value="{{ expense.date|date:'Y-m-d' }}" required
                    style="background:rgba(255,255,255,0.05); color:#fff; padding:12px 16px; border-radius:12px; border:1px solid rgba(255,255,255,0.15); font-size:1rem; width:100%; box-sizing:border-box;">
            </div>
            <div style="margin-bottom:20px; display:flex; flex-direction:column; gap:8px;">
                <label style="color:#94a3b8; font-size:0.9rem;">Description (optional)</label>
                <textarea name="description" id="expense_edit_description" rows="3" placeholder="Additional details..."
                    style="background:rgba(255,255,255,0.05); color:#fff; padding:12px; border-radius:12px; border:1px solid rgba(255,255,255,0.1); resize:vertical; width:100%; box-sizing:border-box; font-family:inherit;">{{ expense.description|default:"" }}</textarea>
            </div>

            <!-- Reminder Section -->
            <div style="background:rgba(245,158,11,0.07); padding:1.4rem; border-radius:16px; border:1px solid rgba(245,158,11,0.2); margin-bottom:25px;">
                <label style="display:flex; align-items:center; gap:12px; cursor:pointer; margin-bottom:14px;">
                    <input type="checkbox" name="is_remembered" id="expense_edit_is_remembered" {% if expense.is_remembered %}checked{% endif %}
                        style="width:18px; height:18px; cursor:pointer; accent-color:#f59e0b;">
                    <span style="color:#f59e0b; font-size:0.95rem; font-weight:600;">📌 Mark as Important / Pinned</span>
                </label>
                <div style="display:flex; flex-direction:column; gap:8px;">
                    <label style="color:#94a3b8; font-size:0.85rem;">Reminder Note (optional)</label>
                    <textarea name="reminder_note" id="expense_edit_reminder_note" placeholder="e.g. Recurring monthly expense..." rows="2"
                        style="background:rgba(255,255,255,0.05); color:#fff; padding:12px; border-radius:12px; border:1px solid rgba(255,255,255,0.1); resize:vertical; width:100%; box-sizing:border-box; font-family:inherit;">{{ expense.reminder_note|default:"" }}</textarea>
                </div>
            </div>

            <div style="display:flex; gap:12px;">
                <button type="submit" id="update_expense_btn" class="view-all-btn" style="flex:1;">✅ Update Expense</button>
                <a href="{% url 'admin_panel:finance_expenses' %}" id="cancel_expense_edit" style="flex:1; text-align:center; padding:12px; background:rgba(255,255,255,0.05); color:#94a3b8; border-radius:12px; text-decoration:none; display:flex; align-items:center; justify-content:center;">Cancel</a>
            </div>
        </form>
    </div>
</div>
<!-- END: EXPENSE_EDIT_SECTION -->
{% endblock %}
