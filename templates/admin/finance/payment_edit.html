{% extends 'base.html' %}
{% load static %}

{% block content %}
<!-- START: PAYMENT_EDIT_SECTION -->
<div class="dashboard-wrapper">
    <div class="section-header">
        <h1>Edit Payment Record</h1>
        <p>Update transaction details and reminder settings.</p>
    </div>

    <div>
        <!-- Student info badge -->
        <div>
            <span>🎓</span>
            <div>
                <p>Student</p>
                <p>{{ payment.student.user.get_full_name }} <span>(#{{ payment.student.student_id }})</span></p>
            </div>
        </div>

        <form method="POST">
            {% csrf_token %}

            <div>
                <label>Fee Type</label>
                <select name="fee_type" id="payment_fee_type" required>
                    {% for ft in fee_types %}
                    <option value="{{ ft.id }}" {% if ft.id == payment.fee_type.id %}selected{% endif %}>
                        {{ ft.name }} (${{ ft.amount }})
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label>Amount Paid ($)</label>
                <input type="number" step="0.01" name="amount_paid" id="payment_amount" value="{{ payment.amount_paid }}" required>
            </div>

            <div>
                <label>Transaction ID</label>
                <input type="text" name="transaction_id" id="payment_txn_id" value="{{ payment.transaction_id }}" required>
            </div>

            <div>
                <label>Payment Status</label>
                <select name="status" id="payment_status">
                    <option value="Paid" {% if payment.status == 'Paid' %}selected{% endif %}>✅ Paid</option>
                    <option value="Pending" {% if payment.status == 'Pending' %}selected{% endif %}>⏳ Pending</option>
                </select>
            </div>

            <!-- Reminder Section -->
            <div>
                <label>
                    <input type="checkbox" name="is_remembered" id="payment_is_remembered" {% if payment.is_remembered %}checked{% endif %}>
                    <span>📌 Mark as Important / Pinned</span>
                </label>

                <div>
                    <label>Reminder Note (optional)</label>
                    <textarea name="reminder_note" id="payment_reminder_note" placeholder="e.g. Verify with receipt..." rows="2">{{ payment.reminder_note|default:"" }}</textarea>
                </div>
            </div>

            <div>
                <button type="submit" id="update_payment_btn" class="view-all-btn">
                    ✅ Update Payment
                </button>

                <a href="{% url 'admin_panel:finance_fees' %}" id="cancel_payment_edit">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
<!-- END: PAYMENT_EDIT_SECTION -->
{% endblock %}
