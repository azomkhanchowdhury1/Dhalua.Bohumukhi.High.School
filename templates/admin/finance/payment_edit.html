{% extends 'base.html' %}
{% load static %}

{% block css %}
<link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
{% endblock %}

{% block content %}
<!-- START: PAYMENT_EDIT_SECTION -->
<div class="dashboard-wrapper">
    <div class="section-header">
        <h1>Edit Payment Record</h1>
        <p>Update transaction details and reminder settings.</p>
    </div>

    <div style="max-width:620px; margin:0 auto; background:rgba(15,23,42,0.6); padding:2.5rem; border-radius:24px; border:1px solid rgba(255,255,255,0.1);">
        <!-- Student info badge -->
        <div style="background:rgba(16,185,129,0.08); padding:1rem 1.5rem; border-radius:14px; border:1px solid rgba(16,185,129,0.2); margin-bottom:25px; display:flex; align-items:center; gap:14px;">
            <span style="font-size:2rem;">🎓</span>
            <div>
                <p style="color:#94a3b8; font-size:0.82rem; margin:0;">Student</p>
                <p style="color:#fff; font-weight:700; font-size:1.05rem; margin:0;">{{ payment.student.user.get_full_name }} <span style="color:#94a3b8; font-weight:400; font-size:0.9rem;">(#{{ payment.student.student_id }})</span></p>
            </div>
        </div>

        <form method="POST">
            {% csrf_token %}
            <div style="margin-bottom:20px; display:flex; flex-direction:column; gap:8px;">
                <label style="color:#94a3b8; font-size:0.9rem;">Fee Type</label>
                <select name="fee_type" id="payment_fee_type" required
                    style="background:rgba(30,41,59,1); color:#fff; padding:12px 16px; border-radius:12px; border:1px solid rgba(255,255,255,0.15); font-size:1rem; width:100%; box-sizing:border-box;">
                    {% for ft in fee_types %}
                    <option value="{{ ft.id }}" {% if ft.id == payment.fee_type.id %}selected{% endif %}>{{ ft.name }} (${{ ft.amount }})</option>
                    {% endfor %}
                </select>
            </div>
            <div style="margin-bottom:20px; display:flex; flex-direction:column; gap:8px;">
                <label style="color:#94a3b8; font-size:0.9rem;">Amount Paid ($)</label>
                <input type="number" step="0.01" name="amount_paid" id="payment_amount" value="{{ payment.amount_paid }}" required
                    style="background:rgba(255,255,255,0.05); color:#fff; padding:12px 16px; border-radius:12px; border:1px solid rgba(255,255,255,0.15); font-size:1rem; width:100%; box-sizing:border-box;">
            </div>
            <div style="margin-bottom:20px; display:flex; flex-direction:column; gap:8px;">
                <label style="color:#94a3b8; font-size:0.9rem;">Transaction ID</label>
                <input type="text" name="transaction_id" id="payment_txn_id" value="{{ payment.transaction_id }}" required
                    style="background:rgba(255,255,255,0.05); color:#fff; padding:12px 16px; border-radius:12px; border:1px solid rgba(255,255,255,0.15); font-size:1rem; width:100%; box-sizing:border-box; font-family:monospace;">
            </div>
            <div style="margin-bottom:20px; display:flex; flex-direction:column; gap:8px;">
                <label style="color:#94a3b8; font-size:0.9rem;">Payment Status</label>
                <select name="status" id="payment_status"
                    style="background:rgba(30,41,59,1); color:#fff; padding:12px 16px; border-radius:12px; border:1px solid rgba(255,255,255,0.15); font-size:1rem; width:100%; box-sizing:border-box;">
                    <option value="Paid" {% if payment.status == 'Paid' %}selected{% endif %}>✅ Paid</option>
                    <option value="Pending" {% if payment.status == 'Pending' %}selected{% endif %}>⏳ Pending</option>
                </select>
            </div>

            <!-- Reminder Section -->
            <div style="background:rgba(245,158,11,0.07); padding:1.4rem; border-radius:16px; border:1px solid rgba(245,158,11,0.2); margin-bottom:25px;">
                <label style="display:flex; align-items:center; gap:12px; cursor:pointer; margin-bottom:14px;">
                    <input type="checkbox" name="is_remembered" id="payment_is_remembered" {% if payment.is_remembered %}checked{% endif %}
                        style="width:18px; height:18px; cursor:pointer; accent-color:#f59e0b;">
                    <span style="color:#f59e0b; font-size:0.95rem; font-weight:600;">📌 Mark as Important / Pinned</span>
                </label>
                <div style="display:flex; flex-direction:column; gap:8px;">
                    <label style="color:#94a3b8; font-size:0.85rem;">Reminder Note (optional)</label>
                    <textarea name="reminder_note" id="payment_reminder_note" placeholder="e.g. Verify with receipt..." rows="2"
                        style="background:rgba(255,255,255,0.05); color:#fff; padding:12px; border-radius:12px; border:1px solid rgba(255,255,255,0.1); resize:vertical; width:100%; box-sizing:border-box; font-family:inherit;">{{ payment.reminder_note|default:"" }}</textarea>
                </div>
            </div>

            <div style="display:flex; gap:12px;">
                <button type="submit" id="update_payment_btn" class="view-all-btn" style="flex:1;">✅ Update Payment</button>
                <a href="{% url 'admin_panel:finance_fees' %}" id="cancel_payment_edit" style="flex:1; text-align:center; padding:12px; background:rgba(255,255,255,0.05); color:#94a3b8; border-radius:12px; text-decoration:none; display:flex; align-items:center; justify-content:center;">Cancel</a>
            </div>
        </form>
    </div>
</div>
<!-- END: PAYMENT_EDIT_SECTION -->
{% endblock %}
