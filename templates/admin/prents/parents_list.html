{% extends 'base.html' %}
{% load static %}

{% block css %}
<link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
{% endblock %}

{% block content %}
<!-- START: PRENTS_PARENTS_LIST_SECTION -->
<div class="dashboard-wrapper">
    <div class="section-header">
        <h1>Parents</h1>
        <p>Manage parents information.</p>
    </div>

    <div style="background:rgba(15,23,42,0.6); padding:2rem; border-radius:24px; border:1px solid rgba(255,255,255,0.1);">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h3 style="color:#fff; margin:0;"><i class="fas fa-list" style="color:#6366f1;"></i> Parents List</h3>
            <a href="#" class="view-all-btn" style="text-decoration:none;">
                <i class="fas fa-plus"></i> Add Parents
            </a>
        </div>
        
        <div style="overflow-x:auto;">
            <table style="width:100%; border-collapse:collapse; color:#fff;">
                <thead>
                    <tr style="border-bottom:1px solid rgba(255,255,255,0.1); color:#94a3b8; text-align:left;">
                        <th style="padding:15px; font-weight:500;">ID</th>
                        <th style="padding:15px; font-weight:500;">Name / Details</th>
                        <th style="padding:15px; font-weight:500; text-align:right;">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr style="border-bottom:1px solid rgba(255,255,255,0.05); transition:background 0.3s;" onmouseover="this.style.background='rgba(255,255,255,0.02)'" onmouseout="this.style.background='transparent'">
                        <td style="padding:15px;">#1</td>
                        <td style="padding:15px;">Sample Entry</td>
                        <td style="padding:15px; text-align:right; display:flex; justify-content:flex-end; gap:10px;">
                            <a href="#" style="background:rgba(99,102,241,0.15); color:#818cf8; padding:8px 12px; border-radius:8px; text-decoration:none;"><i class="fas fa-edit"></i></a>
                            <a href="#" style="background:rgba(239,68,68,0.15); color:#f87171; padding:8px 12px; border-radius:8px; text-decoration:none;"><i class="fas fa-trash"></i></a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<!-- END: PRENTS_PARENTS_LIST_SECTION -->
{% endblock %}
