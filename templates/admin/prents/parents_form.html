{% extends 'base.html' %}
{% load static %}

{% block css %}
<link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
{% endblock %}

{% block content %}
<!-- START: PRENTS_PARENTS_FORM_SECTION -->
<div class="dashboard-wrapper">
    <div class="section-header">
        <h1>Add/Change Parents</h1>
        <p>Update or create a new entry for Parents.</p>
    </div>

    <div style="background:rgba(15,23,42,0.6); padding:2rem; border-radius:24px; border:1px solid rgba(255,255,255,0.1); max-width:800px;">
        <h3 style="color:#fff; margin-bottom:20px; display:flex; align-items:center; gap:10px;">
            <i class="fas fa-edit" style="color:#6366f1;"></i> Entry Form
        </h3>
        <form method="POST">
            {% csrf_token %}
            <div style="display:flex; flex-direction:column; gap:15px;">
                <div style="display:flex; flex-direction:column; gap:6px;">
                    <label style="color:#94a3b8; font-size:0.85rem;">Name</label>
                    <input type="text" name="name" required placeholder="Enter name"
                        style="background:rgba(255,255,255,0.05); color:#fff; padding:12px; border-radius:12px; border:1px solid rgba(255,255,255,0.1);">
                </div>
                <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:10px;">
                    <a href="#" style="background:rgba(255,255,255,0.1); color:#fff; padding:12px 20px; border-radius:12px; text-decoration:none; font-weight:500;">Cancel</a>
                    <button type="submit" class="view-all-btn" style="border:none; cursor:pointer;">
                        <i class="fas fa-save"></i> Save Entry
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>
<!-- END: PRENTS_PARENTS_FORM_SECTION -->
{% endblock %}
