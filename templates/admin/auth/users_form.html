{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="dashboard-wrapper">
    <div class="section-header">
        <h1>{% if edit_user %}Edit{% else %}Add{% endif %} User</h1>
    </div>

    {% if messages %}
    <div>
        {% for message in messages %}
        <div>
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <div>
        <form method="POST">
            {% csrf_token %}

            <div>
                {% if not edit_user %}
                <input type="text" name="username" required placeholder="Username">
                {% endif %}

                <input type="text" name="first_name" value="{{ edit_user.first_name }}" required placeholder="First Name">

                <input type="text" name="last_name" value="{{ edit_user.last_name }}" required placeholder="Last Name">

                <input type="email" name="email" value="{{ edit_user.email }}" required placeholder="Email">

                <button type="submit" class="view-all-btn">
                    <i class="fas fa-save"></i> Save
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
