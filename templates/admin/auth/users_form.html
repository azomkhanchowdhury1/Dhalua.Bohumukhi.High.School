{% extends 'base.html' %}
{% load static %}
{% block content %}
<div class="dashboard-wrapper">
    <div class="section-header">
        <h1>{% if edit_user %}Edit{% else %}Add{% endif %} User</h1>
    </div>
    {% if messages %}
    <div style="margin-bottom:20px;">
        {% for message in messages %}
        <div style="padding:12px 18px; border-radius:10px; margin-bottom:8px; background:rgba(239,68,68,0.15); color:#f87171; border:1px solid rgba(239,68,68,0.3);">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}
    <div style="background:rgba(15,23,42,0.6); padding:2rem; border-radius:24px; border:1px solid rgba(255,255,255,0.1); max-width:800px;">
        <form method="POST">
            {% csrf_token %}
            <div style="display:flex; flex-direction:column; gap:15px;">
                {% if not edit_user %}
                <input type="text" name="username" required placeholder="Username" style="background:rgba(255,255,255,0.05); color:#fff; padding:12px; border-radius:12px; border:1px solid rgba(255,255,255,0.1);">
                {% endif %}
                <input type="text" name="first_name" value="{{ edit_user.first_name }}" required placeholder="First Name" style="background:rgba(255,255,255,0.05); color:#fff; padding:12px; border-radius:12px; border:1px solid rgba(255,255,255,0.1);">
                <input type="text" name="last_name" value="{{ edit_user.last_name }}" required placeholder="Last Name" style="background:rgba(255,255,255,0.05); color:#fff; padding:12px; border-radius:12px; border:1px solid rgba(255,255,255,0.1);">
                <input type="email" name="email" value="{{ edit_user.email }}" required placeholder="Email" style="background:rgba(255,255,255,0.05); color:#fff; padding:12px; border-radius:12px; border:1px solid rgba(255,255,255,0.1);">
                <button type="submit" class="view-all-btn" style="border:none; cursor:pointer;"><i class="fas fa-save"></i> Save</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
