{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="dashboard-wrapper">
    <div>
        <i class="fas fa-exclamation-triangle"></i>
        <h2>Confirm Deletion</h2>
        <p>Are you sure you want to delete this registration request? This action cannot be undone.</p>

        <form method="POST">
            {% csrf_token %}
            <a href="{% url 'admin_panel:registration_requests' %}">Cancel</a>
            <button type="submit">
                <i class="fas fa-trash"></i> Delete
            </button>
        </form>
    </div>
</div>
{% endblock %}
