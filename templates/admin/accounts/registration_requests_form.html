{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="dashboard-wrapper">
    <div class="section-header">
        <h1>Edit Registration Request</h1>
    </div>

    <div>
        <form method="POST">
            {% csrf_token %}

            <div>
                <input type="text" name="first_name" value="{{ req.first_name }}" required placeholder="First Name">

                <input type="text" name="last_name" value="{{ req.last_name }}" required placeholder="Last Name">

                <input type="text" name="phone_number" value="{{ req.phone_number }}" required placeholder="Phone">

                <input type="text" name="role" value="{{ req.role }}" required placeholder="Role">

                <label>
                    <input type="checkbox" name="is_remembered" {% if req.is_remembered %}checked{% endif %}>
                    Remember this request
                </label>

                <textarea name="reminder_note" placeholder="Reminder Note">{{ req.reminder_note }}</textarea>

                <button type="submit" class="view-all-btn">
                    <i class="fas fa-save"></i> Save
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
