{% extends 'base.html' %}
{% load static %}
{% block content %}
<div class="dashboard-wrapper">
    <div class="section-header">
        <h1>Edit Registration Request</h1>
    </div>
    <div style="background:rgba(15,23,42,0.6); padding:2rem; border-radius:24px; border:1px solid rgba(255,255,255,0.1); max-width:800px;">
        <form method="POST">
            {% csrf_token %}
            <div style="display:flex; flex-direction:column; gap:15px;">
                <input type="text" name="first_name" value="{{ req.first_name }}" required placeholder="First Name" style="background:rgba(255,255,255,0.05); color:#fff; padding:12px; border-radius:12px; border:1px solid rgba(255,255,255,0.1);">
                <input type="text" name="last_name" value="{{ req.last_name }}" required placeholder="Last Name" style="background:rgba(255,255,255,0.05); color:#fff; padding:12px; border-radius:12px; border:1px solid rgba(255,255,255,0.1);">
                <input type="text" name="phone_number" value="{{ req.phone_number }}" required placeholder="Phone" style="background:rgba(255,255,255,0.05); color:#fff; padding:12px; border-radius:12px; border:1px solid rgba(255,255,255,0.1);">
                <input type="text" name="role" value="{{ req.role }}" required placeholder="Role" style="background:rgba(255,255,255,0.05); color:#fff; padding:12px; border-radius:12px; border:1px solid rgba(255,255,255,0.1);">
                
                <label style="color:#fff;"><input type="checkbox" name="is_remembered" {% if req.is_remembered %}checked{% endif %}> Remember this request</label>
                <textarea name="reminder_note" placeholder="Reminder Note" style="background:rgba(255,255,255,0.05); color:#fff; padding:12px; border-radius:12px; border:1px solid rgba(255,255,255,0.1); min-height:80px;">{{ req.reminder_note }}</textarea>
                
                <button type="submit" class="view-all-btn" style="border:none; cursor:pointer;"><i class="fas fa-save"></i> Save</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
