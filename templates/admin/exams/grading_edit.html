{% extends 'base.html' %}
{% load static %}

{% block content %}
<!-- START: EXAM_GRADING_EDIT_SECTION -->
<div class="dashboard-wrapper">
    <div class="edit-container">
        <h2 class="edit-title">Edit Grade Rule</h2>
        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label for="name">Grade Name</label>
                <input type="text" name="name" id="name" required class="form-control" value="{{ grade.name }}">
            </div>

            <div>
                <div class="form-group">
                    <label for="min_mark">Min Mark</label>
                    <input type="number" name="min_mark" id="min_mark" required class="form-control"
                        value="{{ grade.min_mark }}">
                </div>
                <div class="form-group">
                    <label for="max_mark">Max Mark</label>
                    <input type="number" name="max_mark" id="max_mark" required class="form-control"
                        value="{{ grade.max_mark }}">
                </div>
            </div>

            <div class="form-group">
                <label for="point">Grade Point</label>
                <input type="number" step="0.01" name="point" id="point" required class="form-control"
                    value="{{ grade.point }}">
            </div>

            <div class="checkbox-group">
                <input type="checkbox" name="is_remembered" id="is_remembered" {% if grade.is_remembered %}checked{%
                    endif %}>
                <label for="is_remembered">Set Active Reminder (Bookmark)</label>
            </div>

            <div class="form-group">
                <label for="reminder_note">Reminder Note</label>
                <textarea name="reminder_note" id="reminder_note" rows="3" class="form-control"
                    placeholder="e.g. Critical boundary, verify all A+ manually...">{{ grade.reminder_note|default:'' }}</textarea>
            </div>

            <div class="btn-container">
                <a href="{% url 'admin_panel:exam_grading' %}" class="btn-cancel">Cancel</a>
                <button type="submit" class="btn-submit">Save Changes</button>
            </div>
        </form>
    </div>
</div>
<!-- END: EXAM_GRADING_EDIT_SECTION -->
{% endblock %}
