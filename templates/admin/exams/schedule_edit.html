{% extends 'base.html' %}
{% load static %}

{% block css %}
<link rel="stylesheet" href="{% static 'css/dashboard_base.css' %}">
<link rel="stylesheet" href="{% static 'css/dashboard_exams.css' %}">
{% endblock %}

{% block content %}
<!-- START: EXAM_SCHEDULE_EDIT_SECTION -->

<div class="dashboard-wrapper">

    <div class="edit-container">

        <h2 class="edit-title">Edit Exam Schedule</h2>

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label for="exam_id">Select Exam</label>
                <select name="exam_id" id="exam_id" required class="form-control">
                    {% for ex in exams %}
                    <option value="{{ ex.id }}" {% if ex.id == schedule.exam.id %}selected{% endif %}>
                        {{ ex.name }}
                    </option>
                    {% endfor %}
                </select>
            </div>


            <div class="form-group">
                <label for="class_id">Select Class</label>
                <select name="class_id" id="class_id" required class="form-control">
                    {% for cls in classes %}
                    <option value="{{ cls.id }}" {% if cls.id == schedule.school_class.id %}selected{% endif %}>
                        {{ cls.name }}
                    </option>
                    {% endfor %}
                </select>
            </div>


            <div class="form-group">
                <label for="subject_id">Subject</label>
                <select name="subject_id" id="subject_id" required class="form-control">
                    {% for sub in subjects %}
                    <option value="{{ sub.id }}" {% if sub.id == schedule.subject.id %}selected{% endif %}>
                        {{ sub.name }} ({{ sub.school_class.name }})
                    </option>
                    {% endfor %}
                </select>
            </div>


            <div class="form-group">
                <label for="date">Date</label>
                <input type="date" name="date" id="date" required class="form-control" value="{{ schedule.date|date:'Y-m-d' }}">
            </div>


            <div class="form-group">
                <label for="start_time">Start Time</label>
                <input type="time" name="start_time" id="start_time" required class="form-control" value="{{ schedule.start_time|time:'H:i' }}">
            </div>


            <div class="form-group">
                <label for="room">Room</label>
                <input type="text" name="room" id="room" required class="form-control" value="{{ schedule.room_number }}">
            </div>


            <div class="checkbox-group">
                <input type="checkbox" name="is_remembered" id="is_remembered" {% if schedule.is_remembered %}checked{% endif %}>
                <label for="is_remembered">Set Active Reminder (Bookmark)</label>
            </div>


            <div class="form-group">
                <label for="reminder_note">Reminder Note / Notice for this Schedule</label>
                <textarea name="reminder_note" id="reminder_note" rows="3" class="form-control" placeholder="e.g. Bring exam board, calculators allowed...">{{ schedule.reminder_note|default:'' }}</textarea>
            </div>


            <div class="btn-container">
                <a href="{% url 'admin_panel:exam_schedule' %}" class="btn-cancel">Cancel</a>
                <button type="submit" class="btn-submit">Save Changes</button>
            </div>

        </form>

    </div>

</div>

<!-- END: EXAM_SCHEDULE_EDIT_SECTION -->
{% endblock %}
