{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="dashboard-wrapper">
    <div class="delete-container">
        <i class="fas fa-exclamation-triangle warning-icon"></i>
        <h2 class="delete-title">Delete Exam?</h2>
        <p class="delete-text">Are you sure you want to delete the exam <strong>{{ exam.name }} ({{ exam.year }})</strong>?<br><br>This action cannot be undone and will delete all associated schedules and results.</p>
        <form method="POST">
            {% csrf_token %}
            <div class="btn-container">
                <a href="{% url 'admin_panel:exam_list' %}" class="btn-cancel">Cancel</a>
                <button type="submit" class="btn-delete">Yes, Delete</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
