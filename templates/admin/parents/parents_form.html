{% extends 'base.html' %}
{% load static %}

{% block css %}
{% endblock %}

{% block content %}
<!-- START: PRENTS_PARENTS_FORM_SECTION -->
<div class="dashboard-wrapper">

    <div class="section-header">
        <h1>Add/Change Parents</h1>
        <p>Update or create a new entry for Parents.</p>
    </div>

    <div>
        <h3>
            <i class="fas fa-edit"></i> Entry Form
        </h3>

        <form method="POST">
            {% csrf_token %}

            <div>
                <div>
                    <label>Name</label>

                    <input type="text" name="name" required placeholder="Enter name">
                </div>

                <div>
                    <a href="#">
                        Cancel
                    </a>

                    <button type="submit">
                        <i class="fas fa-save"></i> Save Entry
                    </button>
                </div>
            </div>

        </form>
    </div>

</div>
<!-- END: PRENTS_PARENTS_FORM_SECTION -->
{% endblock %}
