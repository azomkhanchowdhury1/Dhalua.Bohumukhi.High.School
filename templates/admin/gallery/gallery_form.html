{% extends 'base.html' %}
{% load static %}
{% block content %}
<div class="dashboard-wrapper">
    <div class="section-header">
        <h1>Edit Gallery Item</h1>
    </div>
    <div style="background:rgba(15,23,42,0.6); padding:2rem; border-radius:24px; border:1px solid rgba(255,255,255,0.1); max-width:800px;">
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <div style="display:flex; flex-direction:column; gap:15px;">
                <input type="text" name="title" value="{{ item.title }}" required placeholder="Title" style="background:rgba(255,255,255,0.05); color:#fff; padding:12px; border-radius:12px; border:1px solid rgba(255,255,255,0.1);">
                <select name="category" required style="background:rgba(30,41,59,1); color:#fff; padding:12px; border-radius:12px; border:1px solid rgba(255,255,255,0.1);">
                    <option value="image" {% if item.category == 'image' %}selected{% endif %} style="background:#1e293b; color:#fff;">Image</option>
                    <option value="video" {% if item.category == 'video' %}selected{% endif %} style="background:#1e293b; color:#fff;">Video</option>
                </select>
                <input type="file" name="file" accept="image/*,video/*" style="background:rgba(255,255,255,0.05); color:#fff; padding:12px; border-radius:12px; border:1px solid rgba(255,255,255,0.1);">
                <small style="color:#94a3b8;">Current: {{ item.file.url }}</small>
                
                <label style="color:#fff;"><input type="checkbox" name="is_remembered" {% if item.is_remembered %}checked{% endif %}> Remember this media</label>
                <textarea name="reminder_note" placeholder="Reminder Note" style="background:rgba(255,255,255,0.05); color:#fff; padding:12px; border-radius:12px; border:1px solid rgba(255,255,255,0.1); min-height:80px;">{{ item.reminder_note }}</textarea>
                
                <button type="submit" class="view-all-btn" style="border:none; cursor:pointer;"><i class="fas fa-save"></i> Save</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
