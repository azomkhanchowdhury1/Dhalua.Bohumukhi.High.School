{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="dashboard-wrapper">
    <div class="section-header">
        <h1>Edit Gallery Item</h1>
    </div>

    <div>
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <div>
                <input type="text" name="title" value="{{ item.title }}" required placeholder="Title">

                <select name="category" required>
                    <option value="image" {% if item.category=='image' %}selected{% endif %}>Image</option>
                    <option value="video" {% if item.category=='video' %}selected{% endif %}>Video</option>
                </select>

                <input type="file" name="file" accept="image/*,video/*">

                <small>Current: {{ item.file.url }}</small>

                <label>
                    <input type="checkbox" name="is_remembered" {% if item.is_remembered %}checked{% endif %}>
                    Remember this media
                </label>

                <textarea name="reminder_note" placeholder="Reminder Note">{{ item.reminder_note }}</textarea>

                <button type="submit" class="view-all-btn">
                    <i class="fas fa-save"></i> Save
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
